version: "3.8"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: startup-sim-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: startup_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: startup-sim-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
